    <title>Synthetic Math Fixture</title>

  <body>
    <main>
      <h1>Gradient Descent Notes</h1>
      <p>
        For a differentiable loss function L, update parameters with
        <math>
          <mi>theta</mi>
          <mo>&larr;</mo>
          <mi>theta</mi>
          <mo>-</mo>
          <mi>eta</mi>
          <mo>&nabla;</mo>
          <mi>L</mi>
          <mo>(</mo>
          <mi>theta</mi>
          <mo>)</mo>
        </math>.
      </p>
      <p>The companion should ask what each term controls before moving on.</p>
    </main>
  </body>
</html>
